description: >-
  The United States Capitol Police (USCP) is a federal law enforcement agency
  responsible for protecting the U.S. Capitol Building, members of Congress, and
  visitors to the Capitol complex. The agency is tasked with maintaining security
  and order within the Capitol grounds, conducting background checks on individuals
  entering the buildings, and responding to emergencies and threats. Capitol Police
  officers also provide security for large events and demonstrations taking place
  on Capitol Hill. As a legislative branch entity, the USCP operates under unique
  legal frameworks. In 2024, the agency adopted a FOIA-like request process making
  certain records publicly available upon request.
